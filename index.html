<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Rashad Mayo" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="images/logo.svg" alt="Spots" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img
            src="./images/World Analyst Medium.jpeg"
            alt="Lennox"
            class="profile__avatar"
          />
          <div class="profile__column">
            <h1 class="profile__name">Sylas Alexander</h1>
            <p class="profile__description">World Analyst</p>
            <button type="button" class="profile__edit-btn">
              <img src="./images/pencil.svg" alt="Pencil Icon" />Edit Profile
            </button>
          </div>
          <button type="button" class="profile__add-btn">
            <img src="./images/plus.svg" alt="Plus Icon" /> New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <li class="card">
              <img
                src="./images/Stright of Hormuz  Medium.jpeg"
                alt="Stright of Hormuz"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">Stright of Hormuz</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img
                src="./images/California fire aftermath Medium.jpeg"
                alt="California fire aftermath"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">California fire aftermath</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img
                src="./images/Outerspace POV Medium.jpeg"
                alt="Outerspace POV"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">Outerspace POV</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img
                src="./images/Oil refinary Medium.jpeg"
                alt="Oil refinary"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">Oil refinary</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img
                src="./images/Artimus II mission to the moon Medium.jpeg"
                alt="Artimus II mission to the moon"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">Artimus II mission to the moon</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
            <li class="card">
              <img
                src="./images/Air force fighter jet Medium.jpeg"
                alt="Air force fighter jet"
                class="card__image"
              />
              <div class="card__content">
                <h2 class="card__title">Air force fighter jet</h2>
                <button type="button" class="card__like-btn"></button>
              </div>
            </li>
          </ul>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__text">2025 &copy; Rashad Mayo</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__content">
          <button type="button" class="modal__close-btn"></button>
          <h2 class="modal__title">Edit Profile</h2>
          <form class="modal__form">
            <label for="profile-name-input" class="modal__label">
              Name
              <input
                type="text"
                id="profile-name-input"
                name="name"
                class="modal__input"
                placeholder="Enter your name"
              />
            </label>
            <label for="profile-description-input" class="modal__label">
              Description
              <input
                type="text"
                id="profile-description-input"
                name="description"
                class="modal__input"
                placeholder="Enter your description"
              />
            </label>
            <!-- <label for="profile-avatar-input" class="modal__label">
              <input
                type="url"
                id="avatar"
                name="avatar"
                class="modal__input"
                placeholder="Enter the link to your avatar"
              />
            </label> -->
            <button type="submit" class="modal__save-btn">Save</button>
            <!-- <button type="button" class="modal__cancel-btn">Cancel</button> -->
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__content">
          <button type="button" class="modal__close-btn"></button>
          <h2 class="modal__title">New Post</h2>
          <form class="modal__form">
            <label for="card-image-input" class="modal__label">
              Image link
              <input
                type="url"
                id="card-image-input"
                name="name"
                class="modal__input"
                placeholder="Place a link to your image"
              />
            </label>
            <label for="card-description-input" class="modal__label">
              Caption
              <input
                type="text"
                id="card-description-input"
                name="description"
                class="modal__input"
                placeholder="Type your caption"
              />
            </label>
            <!-- <label for="profile-avatar-input" class="modal__label">
              <input
                type="url"
                id="avatar"
                name="avatar"
                class="modal__input"
                placeholder="Enter the link to your avatar"
              />
            </label> -->
            <button type="submit" class="modal__save-btn">Save</button>
            <!-- <button type="button" class="modal__cancel-btn">Cancel</button> -->
          </form>
        </div>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
